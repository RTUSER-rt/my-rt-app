<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 呼吸治療資源庫</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { color: #1a73e8; font-size: 24px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
        .info { flex-grow: 1; }
        .title { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .type { font-size: 12px; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; }
        .btn { background: #1a73e8; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-left: 10px; transition: 0.3s; display: inline-block; text-align: center; border: none; cursor: pointer; }
        .btn:active { background: #1557b0; }

        /* 彈出選單樣式 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .menu { background: white; width: 85%; max-width: 400px; border-radius: 20px; padding: 25px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .menu h3 { margin-top: 0; color: #333; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .menu-btn { background: #f8f9fa; color: #1a73e8; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; border: 1px solid #e1e4e8; transition: 0.2s; }
        .menu-btn:active { background: #e8f0fe; }
        .close-btn { width: 100%; margin-top: 20px; padding: 10px; border: none; background: #eee; border-radius: 10px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏥 榮總RT資料庫</h1>
    <p style="text-align:center; color:#666;">點擊按鈕後，檔案將自動存入手機供離線使用</p>

    <div class="card">
        <div class="info">
            <div class="title">📚 臨床參考書 PDF</div>
            <span class="type">僅供臨床使用</span>
        </div>
        <button onclick="openMenu()" class="btn">選擇書籍</button>
    </div>

    <div class="card">
        <div class="info">
            <div class="title">📟 呼吸器說明書</div>
            <span class="type">PB840 / Hamilton / Servo</span>
        </div>
        <a href="https://drive.google.com/uc?export=download&id=你的說明書檔案ID" class="btn" style="background: #f4b400;">直接下載</a>
    </div>

    <div class="card">
        <div class="info">
            <div class="title">🎬 上課教學影片</div>
            <span class="type">MP4 影片</span>
        </div>
        <a href="你的影片連結" class="btn" target="_blank">開啟/播放</a>
    </div>

    <div class="card" style="border: 2px dashed #1a73e8; background: #e8f0fe;">
        <div class="info">
            <div class="title">📂 開啟手機內的 PDF</div>
            <p style="font-size: 12px; color: #666; margin: 0;">若已下載過，從這裡選取可免網路秒開</p>
        </div>
        <input type="file" id="fileInput" style="display:none" accept="application/pdf">
        <button onclick="document.getElementById('fileInput').click()" style="background: #34a853; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px;">選擇檔案</button>
    </div>

    <div id="bookOverlay" class="overlay">
        <div class="menu">
            <h3>📖 請選擇參考書</h3>
            <div class="menu-list">
                <a href="https://drive.google.com/file/d/1nyovZwtta4-wrHOTHvq2VsVA0bcRaNdd/view" target="_blank" class="menu-btn">Egan's Fundamentals (13th)</a>
                <a href="你的第二本書連結" target="_blank" class="menu-btn">第二本參考書名稱</a>
                <a href="你的第三本書連結" target="_blank" class="menu-btn">第三本參考書名稱</a>
            </div>
            <button onclick="closeMenu()" class="close-btn">取消</button>
        </div>
    </div>

    <script>
        // 選單控制
        function openMenu() { document.getElementById('bookOverlay').style.display = 'flex'; }
        function closeMenu() { document.getElementById('bookOverlay').style.display = 'none'; }

        // 本地檔案開啟
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                window.location.href = url; 
            }
        };

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'rt-cache-v1';
                    self.addEventListener('fetch', e => {
                        e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                    });`;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
    </script>
</body>
</html>
